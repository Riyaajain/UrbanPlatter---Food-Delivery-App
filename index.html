<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanPlatter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script>
if(!localStorage.getItem("user")){
    window.location.href = "auth.html";
}
</script>

    <!-- Navbar -->
    <nav class="navbar">
        <h1>🍔 UrbanPlatter</h1>
        <div class="button">
            <button onclick="toggleDarkMode()">🌙</button>
            <button id="cart-btn">🛒 Cart</button>
            <button onclick="window.location.href='order.html'">Orders</button>
            <button onclick="toggleMobile()">📱 Mobile View</button>
            <button onclick="logout()">Logout</button>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h2>Delicious Food Delivered To You</h2>
        <p>Order your favorite meals anytime</p>
    </section>

    <!-- Filters -->
    <div class="filters">
        <button onclick="filterFood('all')">All</button>
        <button onclick="filterFood('food')">Food</button>
        <button onclick="filterFood('drink')">Drinks</button>
        <button onclick="filterFood('dessert')">Dessert</button>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search..." onkeyup="searchFood()">
    </div>

    <!-- Menu -->
    <section class="menu" id="menu"></section>

    <!-- Cart -->
    <div class="cart" id="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <h3>Delivery Location</h3>
        <input type="text" id="location" placeholder="Enter your address">
        <button onclick="getLocation()">📍 Use Current Location</button>
        <button onclick="openMap()">View Map</button>
        <select id="payment-method">
            <option>Cash on Delivery</option>
            <option>UPI</option>
            <option>Card</option>
        </select>

        <button class="order-btn" onclick="placeOrder()">Order Now</button>
        <button onclick="closeCart()">Close</button>
    </div>

    <!-- Popup -->
    <div class="popup" id="popup">
        <h2>🎉 Order Placed!</h2>
        <p>Your food is on the way</p>
        <button onclick="closePopup()">OK</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
